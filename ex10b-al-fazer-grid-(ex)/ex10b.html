<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promoções da Loja</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #000;
            color: #fff;
            text-align: center;
        }

        /* Navbar */
        .navbar {
            background-color: #000 !important;
            border-bottom: 1px solid #222;
        }

        /* Carrossel */
        .carousel {
            max-width: 900px;
            margin: auto;
        }

        .carousel-inner img {
            width: 450px;
            height: 450px;
            object-fit: contain;
            margin: auto;
        }

        /* SETAS VISÍVEIS */
        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            background-color: rgba(255,255,255,0.5);
            border-radius: 50%;
            padding: 20px;
        }

        .carousel-control-prev,
        .carousel-control-next {
            width: 10%;
        }

        /* Barra */
        .progress {
            height: 30px;
        }

        #cupomBox {
            display: none;
            margin-top: 20px;
        }

        .btn-start {
            background: gold;
            color: #000;
            font-weight: bold;
            border: none;
        }
    </style>
</head>
<body>

<!-- NAVBAR (corrigida) -->
<nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
  <div class="container-fluid">

    <!-- Logo -->
    <img src="imgs/prime.png" alt="Logo" width="100" height="100" class="d-inline-block align-text-top">

    <!-- Botão mobile -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Conteúdo -->
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">

      <!-- Menu -->
      <div class="navbar-nav">
        <a class="nav-link active" href="#">Home</a>
        <a class="nav-link" href="#">Produtos</a>
        <a class="nav-link" href="#">Desconto</a>
      </div>

      <!-- Carrinho na direita -->
      <div class="ms-auto">
        <a href="#" class="nav-link position-relative">
          <i class="bi bi-cart3 fs-4 text-white"></i>

          <!-- contador opcional -->
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            0
          </span>
        </a>
      </div>

    </div>
  </div>
</nav>

<!-- CARROSSEL (corrigido) -->
<div class="container mt-5">
    <div id="carouselExemplo" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="imgs/produto1.png" class="d-block">
            </div>

            <div class="carousel-item">
                <img src="imgs/produto2.png" class="d-block">
            </div>

            <div class="carousel-item">
                <img src="imgs/produto3.png" class="d-block">
            </div>
        </div>

        <!-- SETAS -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
</div>

<!-- PROGRESSO -->
<div class="container mt-5">
    <h4>Resgate seu desconto</h4>

    <div class="progress mt-3">
        <div class="progress-bar bg-success"
             id="dynamicProgress"
             style="width: 0%;">
            0%
        </div>
    </div>

    <button class="btn btn-start mt-3" onclick="iniciarResgate()" id="btnResgatar">
        Resgatar Desconto
    </button>

    <!-- CUPOM -->
    <div id="cupomBox">
        <h2 class="mt-4 text-success">🎉 Cupom desbloqueado!</h2>
        <h3 class="bg-light text-dark p-2 d-inline-block rounded">DESCONTO20</h3>
        <p>20% OFF em toda loja</p>
    </div>
</div>

<!-- Bootstrap JS (IMPORTANTE) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let progresso = 0;
let intervalo;

function iniciarResgate() {
    let barra = document.getElementById("dynamicProgress");
    let cupom = document.getElementById("cupomBox");
    let botao = document.getElementById("btnResgatar");

    botao.disabled = true;

    intervalo = setInterval(() => {
        if (progresso < 100) {
            progresso += 1;
            barra.style.width = progresso + "%";
            barra.textContent = progresso + "%";
        } else {
            clearInterval(intervalo);

            cupom.style.display = "block";

            alert("🎉 Cupom desbloqueado: 20% OFF em toda loja!");
        }
    }, 40);
}
</script>

</body>
</html>
